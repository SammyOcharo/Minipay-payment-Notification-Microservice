spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

mpesa:
  base-url: https://api.safaricom.co.ke
  callback-url: ${MPESA_CALLBACK_URL}

logging:
  level:
    root: WARN
    com.minipay: INFO