server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: payment-service
          uri: http://payment-service:8081
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0
        - id: notification-service
          uri: http://notification-service:8082
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
        - id: payment-swagger
          uri: http://payment-service:8081
          predicates:
            - Path=/payment/swagger-ui/**,/payment/api-docs/**
          filters:
            - StripPrefix=1
          metadata:
            public: true

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://34.246.208.69:8080"
              - "http://34.246.208.69:8081"
              - "http://34.246.208.69"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
  security:
    oauth2:
      resourceserver:
        jwt:
          secret: ${JWT_SECRET:minipay-super-secret-key-change-in-production-min-256-bits}
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/minipay_gateway}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
jwt:
  secret: ${JWT_SECRET:minipay-super-secret-key-change-in-production-min-256-bits}
  expiration: 86400000
  refresh-expiration: 604800000
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: api-gateway
        url: /api-docs
      - name: payment-service
        url: /payment/api-docs

logging:
  level:
    root: INFO
    com.minipay: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"