spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/minipay_gateway
    username: postgres
    password: postgres

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop

  cloud:
    gateway:
      routes:
        - id: payment-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/payments/**

        - id: notification-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/notifications/**

logging:
  level:
    com.minipay: DEBUG
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: DEBUG