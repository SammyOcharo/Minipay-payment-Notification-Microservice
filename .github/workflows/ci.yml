name: MiniPay CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-api-gateway:
    name: Test API Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: cd api-gateway && ./mvnw test --no-transfer-progress

  test-payment-service:
    name: Test Payment Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: cd payment-service && ./mvnw test --no-transfer-progress

  test-notification-service:
    name: Test Notification Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: cd notification-service && ./mvnw test --no-transfer-progress

  build:
    name: Build All Services
    runs-on: ubuntu-latest
    needs:
      - test-api-gateway
      - test-payment-service
      - test-notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build API Gateway
        run: cd api-gateway && ./mvnw package -DskipTests --no-transfer-progress
      - name: Build Payment Service
        run: cd payment-service && ./mvnw package -DskipTests --no-transfer-progress
      - name: Build Notification Service
        run: cd notification-service && ./mvnw package -DskipTests --no-transfer-progress
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            api-gateway/target/*.jar
            payment-service/target/*.jar
            notification-service/target/*.jar

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on push to main, not on PRs or develop
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/minipay
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            docker-compose ps