name: MiniPay CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Tests run in parallel ─────────────────────────────
  test-api-gateway:
    name: Test API Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: cd api-gateway && ./mvnw test --no-transfer-progress

  test-payment-service:
    name: Test Payment Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: cd payment-service && ./mvnw test --no-transfer-progress

  test-notification-service:
    name: Test Notification Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: cd notification-service && ./mvnw test --no-transfer-progress

  # ─── Build all JARs ────────────────────────────────────
  build:
    name: Build All Services
    runs-on: ubuntu-latest
    needs:
      - test-api-gateway
      - test-payment-service
      - test-notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build API Gateway
        run: cd api-gateway && ./mvnw package -DskipTests --no-transfer-progress
      - name: Build Payment Service
        run: cd payment-service && ./mvnw package -DskipTests --no-transfer-progress
      - name: Build Notification Service
        run: cd notification-service && ./mvnw package -DskipTests --no-transfer-progress
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            api-gateway/target/*.jar
            payment-service/target/*.jar
            notification-service/target/*.jar

  # ─── Deploy to EC2 ─────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          command_timeout: 30m
          script: |
            cd ~/Minipay-payment-Notification-Microservice

            echo "Pulling latest code..."
            git pull origin main

            echo "Stopping existing containers..."
            docker compose down

            echo "Building and starting services..."
            docker compose up -d --build

            echo "Waiting for services to start..."
            sleep 30

            echo "Checking service status..."
            docker compose ps

            echo "Deployment complete!"