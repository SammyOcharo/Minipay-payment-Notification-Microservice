name: MiniPay CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-api-gateway:
    name: Test API Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: cd api-gateway && ./mvnw test --no-transfer-progress

  test-payment-service:
    name: Test Payment Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: cd payment-service && ./mvnw test --no-transfer-progress

  test-notification-service:
    name: Test Notification Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: cd notification-service && ./mvnw test --no-transfer-progress

  build:
    name: Build All Services
    runs-on: ubuntu-latest
    needs:
      - test-api-gateway
      - test-payment-service
      - test-notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build API Gateway
        run: cd api-gateway && ./mvnw package -DskipTests --no-transfer-progress
      - name: Build Payment Service
        run: cd payment-service && ./mvnw package -DskipTests --no-transfer-progress
      - name: Build Notification Service
        run: cd notification-service && ./mvnw package -DskipTests --no-transfer-progress
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            api-gateway/target/*.jar
            payment-service/target/*.jar
            notification-service/target/*.jar

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Create target directories on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/Minipay-payment-Notification-Microservice/api-gateway/target
            mkdir -p ~/Minipay-payment-Notification-Microservice/payment-service/target
            mkdir -p ~/Minipay-payment-Notification-Microservice/notification-service/target

      - name: Copy JARs to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "api-gateway/target/*.jar"
          target: "~/Minipay-payment-Notification-Microservice/api-gateway/target/"
          strip_components: 2

      - name: Copy payment JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "payment-service/target/*.jar"
          target: "~/Minipay-payment-Notification-Microservice/payment-service/target/"
          strip_components: 2

      - name: Copy notification JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "notification-service/target/*.jar"
          target: "~/Minipay-payment-Notification-Microservice/notification-service/target/"
          strip_components: 2

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Minipay-payment-Notification-Microservice
            git pull origin main
            docker compose up -d --build --no-deps api-gateway payment-service notification-service
            docker compose ps